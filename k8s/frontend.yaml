apiVersion: apps/v1
kind: Deployment
metadata:
  name: scalable-frontend
  namespace: scalable-weather-app
  labels:
    app: scalable-frontend
spec:
  replicas: 2 # Scalable!
  selector:
    matchLabels:
      app: scalable-frontend
  template:
    metadata:
      labels:
        app: scalable-frontend
    spec:
      containers:
        - name: scalable-weather-app-frontend
          image: scalable-weather-app/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: scalable-frontend
  namespace: scalable-weather-app
spec:
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000 # Exposes frontend UI to host machine on port 30000
  selector:
    app: scalable-frontend
  type: NodePort
