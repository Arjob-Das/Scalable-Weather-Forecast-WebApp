server.port=8080

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:weatherdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ML Service URL
ml.service.url=http://${ML_HOST:localhost}:${ML_PORT:8000}

# OpenWeather API Configuration
openweather.api.key=${OPENWEATHER_API_KEY:YOUR_OPENWEATHER_API_KEY}

